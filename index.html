<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現場向けデジタルクロック (522x177)</title>
    <style>
        /* 画面焼き付き防止：完全な黒背景 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 522px * 177px 専用コンテナ */
        .clock-container {
            width: 522px;
            height: 177px;
            padding: 12px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            /* 現場環境でのズレを防ぐため、コンテナサイズを厳格に固定 */
            max-width: 522px;
            max-height: 177px;
        }

        /* 上部：日付・曜日エリア（高さを抑えてタイトに） */
        .date-box {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 4px;
            width: 100%;
        }
        .date-text {
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: #cccccc; /* 時刻を引き立てるために少しだけ明度を落とす */
        }
        .day-text {
            font-size: 1.1rem;
            font-weight: bold;
            margin-left: 12px;
            padding: 1px 8px;
            border-radius: 3px;
            background-color: #222222;
        }
        /* 曜日の識別カラー */
        .day-text.sun { color: #ff4d4d; background-color: #2a0000; }
        .day-text.sat { color: #4dadff; background-color: #001f3f; }

        /* 中部・メイン：時刻表示エリア */
        .time-box {
            display: flex;
            align-items: baseline;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace; /* ガタつき防止の等幅 */
            font-weight: bold;
            line-height: 0.95;
        }
        .time-main {
            font-size: 5.2rem; /* 177pxの高さに収まる限界サイズ */
            letter-spacing: -2px;
        }
        .time-seconds {
            font-size: 2.2rem;
            margin-left: 6px;
            color: #888888; /* 秒数はさらに視認性を分けてスマートに */
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="date-box">
            <span class="date-text" id="date-display">2026.06.16</span>
            <span class="day-text" id="day-display">TUE</span>
        </div>

        <div class="time-box">
            <span class="time-main" id="time-display">12:34</span>
            <span class="time-seconds" id="seconds-display">56</span>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // 日付整形
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            document.getElementById('date-display').textContent = `${year}.${month}.${date}`;

            // 曜日整形
            const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const dayIdx = now.getDay();
            const dayElement = document.getElementById('day-display');
            dayElement.textContent = days[dayIdx];
            
            dayElement.className = 'day-text'; 
            if (dayIdx === 0) dayElement.classList.add('sun');
            if (dayIdx === 6) dayElement.classList.add('sat');

            // 時刻整形
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time-display').textContent = `${hours}:${minutes}`;

            // 秒整形
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('seconds-display').textContent = seconds;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
